spring.application.name=cognitive-vault

# Database Connection
spring.datasource.url=jdbc:postgresql://localhost:5434/cognitive_vault
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Config
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# SQL Initialization
spring.sql.init.mode=always

# AWS SDK / MinIO S3 Configuration
aws.region=us-east-1
aws.access-key=${AWS_ACCESS_KEY:minioadmin}
aws.secret-key=${AWS_SECRET_KEY:minioadmin}
aws.s3.endpoint=http://localhost:9000
aws.s3.bucket=cognitive-vault-attachments

# Spring AI ONNX Model Cache (divert from full root /tmp to home partition)
spring.ai.embedding.transformer.cache.directory=${user.home}/.cognitive-vault/cache/spring-ai-onnx-model

# Elasticsearch Connection
spring.elasticsearch.uris=http://localhost:9200

# File Upload Size Limits
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.port=8081
